    <script type="text/javascript">
        (function () {

            var disclaimerAdded = false;
            var retryCount = 0;

            // waits until certain elements exist on the page and then adds a disclaimer message
            function addLocalization() {
                if ($('votewa-candidate-page').length == 1 &&
                    $('votewa-candidate-page:first-of-type > div:first-of-type > div:last-of-type').length == 1 &&
                    $('#divCustom01').length == 0) {
                    $('votewa-candidate-page:first-of-type > div:first-of-type > div:last-of-type').append('<div id="divCustom01" _ngcontent-c2>Candidates submit their statements. Election officials do not correct typos or verify statements for accuracy.</div>');
                    disclaimerAdded = true;
                }
            }

            function fixWidthOfCard() {
                if ($('.card.rounded.shadow.bg-transparent.col-xl-6.ml-auto.mr-auto.p-0').length == 1) {
                    $('.card.rounded.shadow.bg-transparent.col-xl-6.ml-auto.mr-auto.p-0').addClass('col-xl-8').removeClass('col-xl-6');
                }
                if ($("mat-tab-body > div > div > div.right.borderLeft.ng-star-inserted").css('max-width') == '300px') {
                    $("mat-tab-body > div > div > div.right.borderLeft.ng-star-inserted").css('max-width', '350px');
                }
            }

            // replace the normal "Back" button with custom "Back" and "Continue" buttons in preview mode
            function customizePreviewButtons() {
                if (!window.previewMode) return;

                // get the footer where the normal "Back" button is located
                const footer = document.querySelector('.card-footer.bg-light');

                if (!footer) return;

                // hide the normal "Back" button
                const oldBack = footer.querySelector('button');
                if (oldBack) oldBack.style.display = 'none';

                // stop if our custom buttons already exist
                if (footer.querySelector('#previewBackBtn')) return;

                // create the custom "Back" button
                const previewBackBtn = document.createElement('a');
                previewBackBtn.id = 'previewBackBtn';
                previewBackBtn.className = 'btn btn-primary btn-lg mr-2';
                previewBackBtn.innerHTML = '<i class="fa fa-chevron-left"></i> Back to My Statement';
                previewBackBtn.href = '/CandidateFiling/CandidatePamphlet.aspx?k=' + window.candidateId + '&t=' + window.token;
                //previewBackBtn.onclick = function () {
                //    window.location.href = '/CandidateFiling/CandidatePamphlet.aspx?k=' + window.candidateId + '&t=' + window.token;
                //};

                // create the custom "Continue" button
                const previewContinueBtn = document.createElement('a');
                previewContinueBtn.id = 'previewContinueBtn';
                previewContinueBtn.className = 'btn btn-primary btn-lg';
                previewContinueBtn.innerHTML = '<i class="fa fa-check"></i> Submit Statement';
                previewContinueBtn.href = '/CandidateFiling/CandidatePamphlet.aspx?k=' + window.candidateId + '&t=' + window.token + '&submit=true';
                //previewContinueBtn.onclick = function () {
                //    window.location.href = '/CandidateFiling/CandidatePamphlet.aspx?k=' + window.candidateId + '&t=' + window.token;
                //};

                // create the custom "Print" button
                const previewPrintBtn = document.createElement('a');
                previewPrintBtn.id = 'previewPrintBtn';
                previewPrintBtn.className = 'btn btn-primary btn-lg';
                previewPrintBtn.innerHTML = '<i class="fa fa-print"></i> Print Statement';
                previewPrintBtn.href = "#";
                previewPrintBtn.onclick = function (e) {
                    e.preventDefault();
                    window.print();
                };

                // Insert buttons
                if (window.previewMode === true && window.candidateIsSubmitted === true) {
                    footer.querySelector('nav.actions').appendChild(previewBackBtn);
                    footer.querySelector('nav.actions').appendChild(previewPrintBtn);
                }
                else if (window.previewMode === true) {
                    footer.querySelector('nav.actions').appendChild(previewBackBtn);
                    footer.querySelector('nav.actions').appendChild(previewContinueBtn);
                }
            }


            $(document).ready(function () {

                // re-add the disclaimer any time there are changes in the body
                const observer = new MutationObserver(() => {
                    addLocalization();
                    customizePreviewButtons();
                });

                observer.observe(document.body, {
                    childList: true,
                    subtree: true
                });

                // try every 1 second to add the disclaimer message to the page
                var disclaimerInterval = window.setInterval(function () {

                    // if the right conditions are met, "disclaimerAdded" will be set to true
                    addLocalization();
                    customizePreviewButtons();

                    retryCount++;

                    // if the disclaimer was added successfully or if we exceeded the maximum attempts, then cancel the interval
                    if (disclaimerAdded || retryCount >= 20) {
                        clearInterval(disclaimerInterval);
                    }

                }, 1000);

                window.setInterval(fixWidthOfCard, 500);
            });

        })();
    </script>
