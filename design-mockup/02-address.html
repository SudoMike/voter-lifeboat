<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Voter Lifeboat — Address entry</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700;6..12,800&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css"></head><body>

<main class="screen" style="padding-bottom:28px">
  <nav style="padding:20px 24px"><a href="01-landing.html" style="font-family:var(--font-display);font-weight:700;font-size:15px;color:var(--muted);text-decoration:none">← back</a></nav>
  <section style="padding:6px 24px 0">
    <h1 class="display display--lg">Where do you call home port?</h1>
    <p class="copy" style="margin-top:12px">King County ballots differ street by street. Your address finds your districts — then it's forgotten. We never store it.</p>
  </section>
  <section style="padding:22px 24px 0">
    <div class="input">
      <span class="input-icon">⌖</span>
      <input type="text" placeholder="4218 SW Othello St, Seattle…" aria-label="Street address">
    </div>
    <button class="btn btn--coral btn--md" style="margin-top:16px">Find my ballot</button>
    <p class="note" style="margin-top:24px;color:var(--muted)">Street address only — no name, no email, no signup. Ever.</p>
  </section>
</main>
</body></html>
