<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Voter Lifeboat — Address error</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700;6..12,800&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css"></head><body>

<main class="screen" style="padding:44px 24px 40px;text-align:center">
  <div style="width:64px;height:64px;margin:0 auto;border-radius:50%;background:var(--coral-tint);display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--coral);font-weight:800">?</div>
  <h1 class="display display--md" style="margin-top:14px">Hmm, we're off the map</h1>
  <p class="copy" style="margin:10px auto 0;max-width:300px">We couldn't match that address in King County. Check the spelling, or try adding your city or ZIP.</p>
  <div class="input input--error" style="margin:20px auto 0;max-width:300px;text-align:left">
    <input type="text" value="4218 SW Othello St" aria-label="Street address" aria-invalid="true">
  </div>
  <button class="btn btn--navy btn--sm" style="margin-top:16px">Try again</button>
  <p style="margin:14px 0 0;font-size:13px;font-weight:700;color:var(--seafoam)">Outside King County? This guide is county-only for now.</p>
</main>
</body></html>
