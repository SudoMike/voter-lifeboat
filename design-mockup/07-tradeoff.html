<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Voter Lifeboat — Interview — trade-off scenario</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700;6..12,800&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css"></head><body>

<main class="screen screen--seafoam" style="padding-bottom:30px">
  <header style="padding:20px 24px 0;display:flex;justify-content:space-between;align-items:center">
    <div class="eyebrow" style="color:var(--navy);letter-spacing:2px">⚓ TRADE-OFF · 2 OF 3</div>
    <div class="progress-count" style="color:var(--navy)">9 of 14</div>
  </header>
  <section style="padding:26px 24px 0">
    <h1 class="display" style="font-size:29px;line-height:1.2;color:#fff;text-shadow:0 2px 0 rgba(27,58,87,.2);text-wrap:pretty">A budget surplus appears. Where does it go?</h1>
    <p style="font-size:14px;font-weight:700;margin:8px 0 0;color:#EAF6F2">No splitting it — pick the one that matters more.</p>
  </section>
  <section style="display:flex;flex-direction:column;gap:12px;padding:24px 20px 0">
    <button class="choice">
      <div class="choice-label">OPTION A</div>
      <div class="choice-text">Hire more police officers</div>
    </button>
    <div class="vs">— or —</div>
    <button class="choice">
      <div class="choice-label">OPTION B</div>
      <div class="choice-text">Expand homelessness services</div>
    </button>
  </section>
</main>
</body></html>
