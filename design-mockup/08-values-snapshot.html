<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Voter Lifeboat — Interview finale — values snapshot</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700;6..12,800&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css"></head><body>

<main class="screen" style="padding-bottom:30px">
  <header class="screen--navy" style="padding:30px 24px 26px;text-align:center;border-radius:0 0 32px 32px">
    <div class="eyebrow" style="letter-spacing:2px">ALL 14 ANSWERED 🎉</div>
    <h1 class="display" style="font-size:28px;color:var(--cream);margin-top:8px">Your values snapshot</h1>
  </header>
  <section class="stack" style="padding:22px 24px 0">
    <div>
      <div class="value-row"><span>Housing &amp; density</span><span class="tag tag--star">cared most ★</span></div>
      <div class="bar"><i class="is-coral" style="width:92%"></i></div>
    </div>
    <div>
      <div class="value-row"><span>Climate urgency</span></div>
      <div class="bar"><i style="width:78%"></i></div>
    </div>
    <div>
      <div class="value-row"><span>Transit priority</span></div>
      <div class="bar"><i style="width:64%"></i></div>
    </div>
    <div>
      <div class="value-row"><span>Tax appetite</span><span class="tag">leans yes</span></div>
      <div class="bar"><i class="is-light" style="width:55%"></i></div>
    </div>
    <div>
      <div class="value-row"><span>Public safety approach</span><span class="tag">mixed</span></div>
      <div class="bar"><i class="is-light" style="width:42%"></i></div>
    </div>
  </section>
  <section style="margin:24px 24px 0;text-align:center">
    <button class="btn btn--coral btn--lg" style="font-size:18px">Show me my ballot →</button>
  </section>
</main>
</body></html>
