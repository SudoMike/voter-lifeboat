<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Voter Lifeboat — Interview — statement card</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700;6..12,800&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css"></head><body>

<main class="screen" style="padding-bottom:26px">
  <header class="progress" style="padding:18px 24px 0">
    <div class="progress-track">
      <div class="progress-fill" style="width:36%"></div>
      <div class="progress-sail" style="left:36%"></div>
    </div>
    <div class="progress-count">5 of 14</div>
  </header>
  <section class="statement" style="margin:22px 20px 0">
    <div class="eyebrow">HOUSING · CARD 5</div>
    <p class="statement-text">New apartment buildings should be allowed in more neighborhoods, even if it changes their character.</p>
    <div class="swipe-hint">↔ swipe, or tap below</div>
  </section>
  <section class="answer-row" style="padding:18px 20px 0">
    <button class="answer answer--disagree">Disagree</button>
    <button class="answer answer--agree">Agree</button>
  </section>
  <button class="skip" style="margin-top:14px">skip this one →</button>
</main>
</body></html>
